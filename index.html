<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Choose Your Future</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: 2.6rem;
      color: #ffffff;
      margin-bottom: 12px;
      text-align: center;
    }

    .subtitle {
      font-size: 1.1rem;
      color: #8b949e;
      margin-bottom: 60px;
      text-align: center;
    }

    .card-grid {
      display: flex;
      gap: 32px;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 48px 40px;
      text-align: center;
      text-decoration: none;
      color: inherit;
      width: 240px;
      transition: border-color 0.2s, transform 0.2s;
    }

    .card:hover {
      border-color: #58a6ff;
      transform: translateY(-4px);
    }

    .card-name {
      font-size: 1.4rem;
      font-weight: bold;
      color: #ffffff;
      margin-bottom: 10px;
    }

    .card-desc {
      font-size: 0.9rem;
      color: #8b949e;
      line-height: 1.5;
    }

    .card-arrow {
      display: block;
      margin-top: 24px;
      font-size: 1.4rem;
      color: #58a6ff;
    }
  </style>
</head>
<body>

  <h1>Choose Your Future</h1>
  <p class="subtitle">How Today's Emissions Decide Tomorrow's Climate</p>

  <div class="card-grid">

    <a class="card" href="abby_plot/index.html">
      <div class="card-name">Abby</div>
      <div class="card-desc">abby plot</div>
      <span class="card-arrow">→</span>
    </a>

    <a class="card" href="chidiebere_plot/index.html">
      <div class="card-name">Chidiebere</div>
      <div class="card-desc">Chidiebere plot</div>
      <span class="card-arrow">→</span>
    </a>
    <a class="card" href="sonya_plot/index.html">
      <div class="card-name">Sonya</div>
      <div class="card-desc">Sonya plot</div>
      <span class="card-arrow">→</span>
    </a>

  </div>

</body>
</html>
